version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm --prefix todo-app install --legacy-peer-deps
        - npm --prefix todo-app run lint
        - npm --prefix todo-app audit --audit-level=moderate
    build:
      commands:
        - npm --prefix todo-app run build
  artifacts:
    baseDirectory: todo-app/build
    files:
      - '**/*'
  cache:
    paths:
      - todo-app/node_modules/**/*
